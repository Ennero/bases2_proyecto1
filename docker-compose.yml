services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mundiales_db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "Mundiales2026!"
      MSSQL_DATABASE: "mundiales"
    command: ["/bin/bash", "/docker/init/run_init.sh"]
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./docker/init:/docker/init:ro
      - ./py/db:/db_scripts:ro
      - ./datos_normalizados_web:/csv
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  mssql_data:
