services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mundiales_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mundiales
      POSTGRES_PASSWORD: mundiales123
      POSTGRES_DB: mundiales
    ports:
      - "5432:5432"
    volumes:
      # Datos persistentes del contenedor
      - postgres_data:/var/lib/postgresql/data
      # Scripts de inicialización (orden alfabético, solo la primera vez)
      # 01: crea tablas  |  02: limpia CSVs (bash+python)  |  03: carga datos (SQL)
      - ./docker/init/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./docker/init/02_fix_csvs.sh:/docker-entrypoint-initdb.d/02_fix_csvs.sh
      - ./docker/init/03_etl.sql:/docker-entrypoint-initdb.d/03_etl.sql
      # Carpeta de CSVs montada dentro del contenedor
      - ./datos_normalizados_web:/csv
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mundiales -d mundiales"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: